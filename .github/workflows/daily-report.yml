name: Daily Odds Report

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Days of history to analyze"
        required: false
        default: "7"
        type: string
permissions:
  contents: write

concurrency:
  group: daily-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily report
        id: report
        shell: bash
        run: |
          set -euo pipefail

          # Use workflow input if present (manual dispatch), otherwise default to 30 (schedule)
          DAYS="${{ github.event.inputs.days }}"
          if [ -z "${DAYS:-}" ]; then
            DAYS="30"
          fi

          python -m data_jobs.reports.simplified_daily_report \
            --days "$DAYS" \
            --no-email

          REPORT_DATE="$(date +'%Y-%m-%d')"
          echo "date=$REPORT_DATE" >> "$GITHUB_OUTPUT"
          echo "report_path=reports/daily_report_${REPORT_DATE}.html" >> "$GITHUB_OUTPUT"

      - name: Commit and push reports
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/ data/predictions/ || true

          if [ -n "$(git status --porcelain)" ]; then
            timestamp="$(date -u +'%Y-%m-%d')"
            git commit -m "Daily odds report: ${timestamp}"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: |
            reports/*.html
            reports/charts/*.png
          retention-days: 30
