# Unified Odds API workflow - Fetches both NFL and NBA odds
# Optimized for free tier: runs 2x daily to conserve API quota (~60 requests/month)

name: Unified Odds (2x daily)

on:
  schedule:
    # Run twice daily:
    # - 10:00 UTC (5:00 AM ET / 6:00 AM ET DST) - Morning snapshot
    # - 22:00 UTC (5:00 PM ET / 6:00 PM ET DST) - Evening snapshot before games
    - cron: "0 10 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport to fetch (nfl, nba, or all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - nfl
          - nba

permissions:
  contents: write

env:
  ALERT_EMAIL: tremayne.watterson@gmail.com

concurrency:
  group: unified-odds
  cancel-in-progress: false

jobs:
  fetch-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # fetch_odds now exits non-zero when any sport's fetch fails
      # (a successful call returning zero games, e.g. offseason, is fine),
      # so this step - and the job - fail loudly on an API outage.
      - name: Fetch odds data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          set -euo pipefail
          sport="${{ github.event.inputs.sport || 'all' }}"
          python -m data_jobs.odds_api.fetch_odds --sport "$sport"

      - name: Export web slate JSON
        run: python -m data_jobs.export_web_json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add all data files including usage tracking
          git add data/*.csv data/**/*.csv data/api_usage.json web/public/data/*.json || true

          if [ -n "$(git status --porcelain)" ]; then
            timestamp=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "Odds update: $timestamp"
            git push
          else
            echo "No changes to commit."
          fi

      # Runs after the commit so fresh data from healthy sports is preserved
      # even when another sport's _latest.csv has gone stale. Fails the job
      # if a sport with upcoming games has data older than the threshold.
      - name: Check data staleness
        run: |
          sport="${{ github.event.inputs.sport || 'all' }}"
          python -m data_jobs.odds_api.check_staleness --sport "$sport" --threshold-days 3

      # Secrets can't be referenced in `if:` expressions, so gate in bash
      # (same pattern as daily-report.yml).
      - name: Decide whether to send failure email
        id: failgate
        if: failure()
        shell: bash
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SMTP_USERNAME:-}" ] || [ -z "${SMTP_PASSWORD:-}" ]; then
            echo "send=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Failure email not sent - SMTP credentials not configured."
            exit 0
          fi
          echo "send=true" >> "$GITHUB_OUTPUT"

      - name: Send failure notification email
        if: ${{ failure() && steps.failgate.outputs.send == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ env.ALERT_EMAIL }}
          from: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
          subject: "[can-tre-beat-vegas] Unified Odds workflow FAILED (run #${{ github.run_number }})"
          html_body: |
            <h2>Unified Odds workflow failed</h2>
            <p>Repository: <strong>${{ github.repository }}</strong></p>
            <p>Workflow: <strong>${{ github.workflow }}</strong> (run #${{ github.run_number }})</p>
            <p>The odds fetch or staleness check failed. This usually means an
            Odds API outage, an exhausted quota, or a stale
            <code>_latest.csv</code> despite upcoming games.</p>
            <p>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                View the failed run logs
              </a>
            </p>
            <hr>
            <p><small>Automated alert from the Can-Tre-Beat-Vegas odds tracking system.</small></p>
          ignore_cert: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: odds-data-${{ github.run_number }}
          path: |
            data/*_latest.csv
            data/**/*_latest.csv
            data/api_usage.json
          retention-days: 7
